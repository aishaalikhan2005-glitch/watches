<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Register - ROLEX</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

  <style>
    body {
      background: linear-gradient(135deg, #667eea, #764ba2);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .register-card {
      max-width: 480px;
      width: 100%;
      border-radius: 15px;
      position: relative;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
    }

    .cancel-btn {
      position: absolute;
      top: 10px;
      right: 10px;
    }
  </style>
</head>

<body>

  <div class="card register-card p-4 bg-white">

    <!-- Cancel Button -->
    <a href="{{ url_for('home') }}" class="btn btn-danger btn-sm cancel-btn">
      Cancel
    </a>

    <h4 class="text-center mb-3 mt-3">Create Account</h4>
    <p class="text-center text-muted mb-4">Register to get started</p>

    <!-- FORM (Flask ready) -->
    <form method="POST" action="{{ url_for('register') }}">

      <div class="mb-3">
        <label class="form-label">Full Name</label>
        <input type="text" name="fullname" class="form-control" placeholder="Enter your name" required>
      </div>

      <div class="mb-3">
        <label class="form-label">Email</label>
        <input type="email" name="email" class="form-control" placeholder="Enter email" required>
      </div>

      <div class="mb-3">
        <label class="form-label">Phone Number</label>
        <input type="text" name="phone" class="form-control" placeholder="Enter phone number">
      </div>

      <div class="mb-3">
        <label class="form-label">Username</label>
        <input type="text" name="username" class="form-control" placeholder="Create username" required>
      </div>

      <div class="mb-3">
        <label class="form-label">Password</label>
        <input type="password" name="password" class="form-control" placeholder="Create password" required>
      </div>

      <button type="submit" class="btn btn-success w-100">Register</button>

    </form>

    <p class="text-center mt-3">
      Already have an account?
      <a href="{{ url_for('login') }}">Login</a>
    </p>

  </div>

</body>

</html>
