<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - ROLEX</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">

  <style>
    body {
      background: #f4f6f9;
    }

    .login-card {
      max-width: 420px;
      width: 100%;
      border-radius: 15px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
      border: none;
    }
  </style>
</head>

<body>

  <!-- NAVBAR -->
  <nav class="navbar navbar-expand-sm" style="background-color: rgb(231, 225, 225);">
    <div class="container-fluid">

      <a class="navbar-brand d-flex align-items-center" href="{{ url_for('home') }}">
        <img src="{{ url_for('static', filename='images/1.jpg') }}"
          style="border-radius:50%;height:60px;width:60px;object-fit:cover;">
        <h2 class="ms-3 m-0">ROLEX</h2>
      </a>

      <ul class="navbar-nav ms-auto">
       
        <li class="nav-item"><a class="nav-link" href="{{ url_for('register') }}">REGISTER</a></li>
      </ul>

    </div>
  </nav>

  <!-- LOGIN SECTION -->
  <div class="d-flex justify-content-center align-items-center" style="min-height: 80vh;">

    <div class="card login-card p-4 bg-white">

      <h3 class="text-center mb-2">Welcome Back</h3>
      <p class="text-center text-muted mb-4">Login to continue</p>

      <!-- Flask Ready Form -->
      <form method="POST" action="{{ url_for('login') }}">

        <div class="mb-3">
          <label class="form-label">Username or Email</label>
          <input type="text" name="username" class="form-control" placeholder="Enter username/email" required>
        </div>

        <div class="mb-3">
          <label class="form-label">Password</label>
          <input type="password" name="password" class="form-control" placeholder="Enter password" required>
        </div>

        <div class="d-flex justify-content-between mb-3">
          <div>
            <input type="checkbox"> Remember me
          </div>
          <a href="#" class="text-decoration-none">Forgot password?</a>
        </div>

        <button class="btn btn-primary w-100" type="submit">Login</button>

      </form>

      <p class="text-center mt-3">
        Don't have an account?
        <a href="{{ url_for('register') }}">Register</a>
      </p>

    </div>

  </div>

</body>

</html>
